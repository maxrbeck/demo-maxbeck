<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Drum Kit</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f0f0;
        }
        .container {
            display: flex;
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 800px;
            align-items: center;
            gap: 20px;
        }
        img {
            width: 50%;
            max-height: 400px;
            object-fit: contain; /* Keeps the image fit in frame */
            border-radius: 5px;
        }
        .content {
            flex: 1;
        }
        h1 {
            color: #007bff;
            margin-top: 0;
        }
        @media (max-width: 600px) {
            .container { flex-direction: column; text-align: center; }
            img { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="drums.jpeg" alt="My Drums">
        <div class="content">
            <h1>My Drum Kit</h1>
            <p>This is a picture of my drums. I've been playing since i was 12, so over 8 years now. It's a way I like to relieve stress and express myself creatively.</p>
        </div>
    </div>
</body>
</html>
