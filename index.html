<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Drum Kit</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            color: #212529;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 2rem;
            padding: 2.5rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
        }
        .image-section {
            flex: 1;
            min-width: 0; /* Prevents flex items from overflowing */
        }
        .text-section {
            flex: 1;
            text-align: left;
        }
        h1 {
            margin-top: 0;
            color: #007bff;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .drum-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0;
            color: #495057;
        }
        /* Responsive adjustment for mobile */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                text-align: center;
                padding: 1.5rem;
            }
            .text-section {
                text-align: center;
            }
            .image-section {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img 
                src="image_11a6ee.jpg" 
                alt="My drum set" 
                class="drum-image"
                onerror="this.parentElement.style.display='none'; this.parentElement.nextElementSibling.querySelector('.fallback').style.display='block';"
            >
        </div>

        <div class="text-section">
            <div class="fallback" style="display:none; padding: 20px; border: 2px dashed #dee2e6; border-radius: 8px; margin-bottom: 1.5rem; text-align: center;">
                <p style="font-style: italic; color: #6c757d;"></p>
            </div>
            <h1>My Drum Kit</h1>
            <p>This is a picture of my drums. I've been playing since i was 12, so over 8 years now. It's a way I like to relieve stress and express myself creatively.</p>
        </div>
    </div>
</body>
</html>
